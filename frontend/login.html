<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Login - CourseHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Same fonts as dashboard -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="login.css">
</head>
<body>

<!-- Theme toggle -->
<button class="theme-btn" id="themeToggle">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light Mode</span>
</button>

<div class="login-container">
    <div class="login-card">

        <div class="brand">Course<span>Hub</span></div>
         <img src="logo.png" alt="Don Bosco University" class="auth-logo">
        <p class="subtitle">Login to continue</p>

        <div class="alert-hub" id="errorAlert"></div>

        <form action="/login" method="POST">

            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-theme">Login</button>

        </form>

        <div class="divider"></div>

        <div class="register-link">
            New here? <a href="register.html">Create an account</a>
        </div>

    </div>
</div>

<script>
    const html = document.documentElement;
    const btn = document.getElementById("themeToggle");
    const icon = document.getElementById("themeIcon");
    const label = document.getElementById("themeLabel");

    function applyTheme(theme) {
        html.setAttribute("data-theme", theme);
        if (theme === "light") {
            icon.textContent = "🌙";
            label.textContent = "Dark Mode";
        } else {
            icon.textContent = "☀️";
            label.textContent = "Light Mode";
        }
        localStorage.setItem("ch-theme", theme);
    }

    btn.addEventListener("click", () => {
        applyTheme(html.getAttribute("data-theme") === "dark" ? "light" : "dark");
    });

    // Sync with dashboard theme preference
    applyTheme(localStorage.getItem("ch-theme") || "dark");

    // Show server-side error if redirected with ?error=1
    const params = new URLSearchParams(window.location.search);
    if (params.get("error")) {
        const el = document.getElementById("errorAlert");
        el.textContent = "Invalid username or password. Please try again.";
        el.classList.add("show");
    }
</script>

</body>
</html>
